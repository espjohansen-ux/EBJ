<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Snake og gangetabellen</title>

<style>
  body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  canvas {
    background: black;
    border: 3px solid white;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h1>🐍 Snake + gangetabellen</h1>
<p>Samle stjerner. Løs gangestykker. Ikke treff deg selv!</p>
<p id="status"></p>

<canvas id="game" width="600" height="600"></canvas>

<script>
/* =========================
   Grunnoppsett
   ========================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
const sizeX = canvas.width / grid;
const sizeY = canvas.height / grid;

const STAR_COUNT = 20;

let snake, dx, dy, speed, running;
let stars = [];
let fireworks = [];
let gameWon = false;

/* =========================
   Hjelpefunksjoner
   ========================= */

function randomPos() {
  return {
    x: Math.floor(Math.random() * sizeX),
    y: Math.floor(Math.random() * sizeY)
  };
}

/* =========================
   Initialisering / restart
   ========================= */

function initGame() {
  snake = [{x: 15, y: 15}];
  dx = 1;
  dy = 0;
  speed = 200;
  running = true;
  gameWon = false;
  fireworks = [];

  stars = [];
  while (stars.length < STAR_COUNT) {
    stars.push(randomPos());
  }

  draw();
  gameLoop();
}

/* =========================
   Tegning
   ========================= */

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* Stjerner */
  ctx.fillStyle = "yellow";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x * grid + 10, s.y * grid + 10, 6, 0, Math.PI * 2);
    ctx.fill();
  });

  /* Slange */
  ctx.fillStyle = "lime";
  snake.forEach(p => {
    ctx.fillRect(p.x * grid, p.y * grid, grid - 1, grid - 1);
  });

  /* Fyrverkeri */
  fireworks.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 4, 4);
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });
  fireworks = fireworks.filter(p => p.life > 0);

  document.getElementById("status").innerText =
    `Lengde: ${snake.length} | Stjerner igjen: ${stars.length}`;
}

/* =========================
   Gangestykke
   ========================= */

function askMultiplication() {
  const a = Math.ceil(Math.random() * 10);
  const b = Math.ceil(Math.random() * 10);
  const answer = prompt(`Hva er ${a} × ${b}?`);
  return parseInt(answer) === a * b;
}

/* =========================
   Fyrverkeri og seier
   ========================= */

function spawnFireworks() {
  for (let i = 0; i < 200; i++) {
    fireworks.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 60,
      color: `hsl(${Math.random() * 360}, 100%, 60%)`
    });
  }
}

function winSequence() {
  gameWon = true;
  running = false;
  spawnFireworks();

  const start = Date.now();

  const interval = setInterval(() => {
    draw();

    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.textAlign = "center";
    ctx.fillText("🎉 Gratulerer!", canvas.width / 2, canvas.height / 2 - 20);
    ctx.fillText("Du klarte alle stjernene!", canvas.width / 2, canvas.height / 2 + 20);

    if (Date.now() - start > 5000) {
      clearInterval(interval);
      if (confirm("Vil du spille igjen?")) {
        initGame();
      }
    }
  }, 100);
}

/* =========================
   Spilloppdatering
   ========================= */

function update() {
  if (!running) return;

  let head = {x: snake[0].x + dx, y: snake[0].y + dy};

  /* Refleksjon i vegg */
  if (head.x < 0 || head.x >= sizeX) {
    dx *= -1;
    head.x = snake[0].x + dx;
  }
  if (head.y < 0 || head.y >= sizeY) {
    dy *= -1;
    head.y = snake[0].y + dy;
  }

  /* Selvkollisjon */
  for (let p of snake) {
    if (p.x === head.x && p.y === head.y) {
      running = false;
      alert("Game over! Slangen traff seg selv.");
      return;
    }
  }

  snake.unshift(head);

  /* Stjernekollisjon */
  let hit = stars.findIndex(s => s.x === head.x && s.y === head.y);
  if (hit >= 0) {
    if (askMultiplication()) {
      speed = Math.max(60, speed - 10);
    } else {
      snake.pop();
    }
    stars.splice(hit, 1);

    if (stars.length === 0) {
      winSequence();
      return;
    }
  } else {
    snake.pop();
  }

  draw();
}

/* =========================
   Tastatur
   ========================= */

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
  if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
  if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
  if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
});

/* =========================
   Spill‑loop
   ========================= */

function gameLoop() {
  update();
  if (running) setTimeout(gameLoop, speed);
}

/* Start spillet */
initGame();

</script>

</body>
</html>
``
