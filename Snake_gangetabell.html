<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Snake og gangetabellen</title>

<style>
  body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  canvas {
    background: black;
    border: 3px solid white;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h1>🐍 Snake + gangetabellen</h1>
<p>Samle stjerner. Løs gangestykker. Ikke treff deg selv!</p>
<p id="status"></p>

<canvas id="game" width="600" height="600"></canvas>

<script>
/* =========================
   Spilltilstander
   ========================= */
const PLAY = "play";
const WIN = "win";
const GAMEOVER = "gameover";

let state = PLAY;

/* =========================
   Canvas og grid
   ========================= */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
const sizeX = canvas.width / grid;
const sizeY = canvas.height / grid;

const STAR_COUNT = 20;

/* =========================
   Spillvariabler
   ========================= */
let snake, dx, dy, speed;
let stars = [];
let fireworks = [];
let winStartTime = null;

/* =========================
   Hjelp
   ========================= */
function randomPos() {
  return {
    x: Math.floor(Math.random() * sizeX),
    y: Math.floor(Math.random() * sizeY)
  };
}

/* =========================
   Init / restart
   ========================= */
function initGame() {
  snake = [{x: 15, y: 15}];
  dx = 1; dy = 0;
  speed = 200;
  state = PLAY;
  fireworks = [];
  winStartTime = null;

  stars = [];
  while (stars.length < STAR_COUNT) {
    stars.push(randomPos());
  }

  draw();
}

/* =========================
   Tegning
   ========================= */
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // stjerner
  ctx.fillStyle = "yellow";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x*grid+10, s.y*grid+10, 6, 0, Math.PI*2);
    ctx.fill();
  });

  // slange
  ctx.fillStyle = "lime";
  snake.forEach(p => {
    ctx.fillRect(p.x*grid, p.y*grid, grid-1, grid-1);
  });

  // fyrverkeri
  fireworks.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 4, 4);
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });
  fireworks = fireworks.filter(p => p.life > 0);

  document.getElementById("status").innerText =
    `Lengde: ${snake.length} | Stjerner igjen: ${stars.length}`;
}

/* =========================
   Gangestykke
   ========================= */
function askMultiplication() {
  const a = Math.ceil(Math.random()*10);
  const b = Math.ceil(Math.random()*10);
  const answer = prompt(`Hva er ${a} × ${b}?`);
  return parseInt(answer) === a*b;
}

/* =========================
   Fyrverkeri
   ========================= */
function spawnFireworks() {
  for (let i = 0; i < 200; i++) {
    fireworks.push({
      x: canvas.width/2,
      y: canvas.height/2,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6,
      life: 60,
      color: `hsl(${Math.random()*360},100%,60%)`
    });
  }
}

/* =========================
   Spilloppdatering
   ========================= */
function update() {

  if (state === PLAY) {

    let head = {x: snake[0].x + dx, y: snake[0].y + dy};

    // vegg-refleksjon
    if (head.x < 0 || head.x >= sizeX) {
      dx *= -1;
      head.x = snake[0].x + dx;
    }
    if (head.y < 0 || head.y >= sizeY) {
      dy *= -1;
      head.y = snake[0].y + dy;
    }

    // selvkollisjon
    for (let p of snake) {
      if (p.x === head.x && p.y === head.y) {
        state = GAMEOVER;
        alert("Game over! Slangen traff seg selv.");
        return;
      }
    }

    snake.unshift(head);

    let hit = stars.findIndex(s => s.x === head.x && s.y === head.y);
    if (hit >= 0) {
      if (askMultiplication()) {
        speed = Math.max(60, speed - 10);
      } else {
        snake.pop();
      }
      stars.splice(hit,1);

      if (stars.length === 0) {
        state = WIN;
        winStartTime = Date.now();
        spawnFireworks();
        return;
      }
    } else {
      snake.pop();
    }
  }

  else if (state === WIN) {
    if (Date.now() - winStartTime > 5000) {
      if (confirm("🎉 Gratulerer, du klarte alle stjernene!\nVil du spille igjen?")) {
        initGame();
      }
    }
  }

  draw();
}

/* =========================
   Tastatur
   ========================= */
document.addEventListener("keydown", e => {
  if (state !== PLAY) return;
  if (e.key === "ArrowUp" && dy === 0) {dx = 0; dy = -1;}
  if (e.key === "ArrowDown" && dy === 0) {dx = 0; dy = 1;}
  if (e.key === "ArrowLeft" && dx === 0) {dx = -1; dy = 0;}
  if (e.key === "ArrowRight" && dx === 0) {dx = 1; dy = 0;}
});

/* =========================
   Game loop
   ========================= */
function gameLoop() {
  update();
  setTimeout(gameLoop, speed);
}

/* Start */
initGame();
gameLoop();

</script>
</body>
</html>
``
